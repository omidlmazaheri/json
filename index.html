<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>نمایش JSON</title>
</head>
<body>

    <h1>اطلاعات من:</h1>
    <div id="result">در حال بارگذاری...</div>

    <script>
        // 1. درخواست به فایل data.json
        fetch('data.json')
            .then(response => response.json()) // تبدیل متن به آبجکت جاوااسکریپت
            .then(data => {
                // 2. نمایش اطلاعات در صفحه
                const html = `
                    <p><strong>نام:</strong> ${data.name}</p>
                    <p><strong>سن:</strong> ${data.age}</p>
                    <p><strong>دانشجو:</strong> ${data.isStudent ? 'بله' : 'خیر'}</p>
                    <p><strong>علایق:</strong> ${data.hobbies.join('، ')}</p>
                `;
                document.getElementById('result').innerHTML = html;
            })
            .catch(error => console.error('خطا:', error));
    </script>

</body>
</html>
