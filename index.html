<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمایش داده‌های JSON</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #007BFF;
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #e9ecef;
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
        }
        .label {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="user-info" class="card">
        <p>در حال بارگذاری...</p>
    </div>

    <script>
        // فرض می‌کنیم فایل data.json در کنار همین فایل html قرار دارد
        // اگر فایل را ندارید، می‌توانید از یک URL نمونه استفاده کنید
        const jsonUrl = 'data.json'; 

        fetch(jsonUrl)
            .then(response => {
                // بررسی می‌کنیم که آیا درخواست موفقیت‌آمیز بوده است یا خیر
                if (!response.ok) {
                    throw new Error('خطا در دریافت فایل: ' + response.status);
                }
                // پاسخ را به فرمت JSON تبدیل می‌کنیم
                return response.json();
            })
            .then(data => {
                // داده‌های JSON به یک آبجکت جاوااسکریپت تبدیل شده‌اند
                console.log(data); // برای دیباگ در کنسول مرورگر

                // ساختن ساختار HTML بر اساس داده‌ها
                const container = document.getElementById('user-info');
                
                // ایجاد المان‌های HTML
                container.innerHTML = `
                    <h2>اطلاعات کاربر</h2>
                    <p><span class="label">نام:</span> ${data.name}</p>
                    <p><span class="label">سن:</span> ${data.age}</p>
                    <p><span class="label">دانشجو:</span> ${data.isStudent ? 'بله' : 'خیر'}</p>
                    
                    <div>
                        <span class="label">علایق:</span>
                        <ul>
                            ${data.hobbies.map(hobby => `<li>${hobby}</li>`).join('')}
                        </ul>
                    </div>

                    <p><span class="label">آدرس:</span> ${data.address || 'ثبت نشده'}</p>
                `;
            })
            .catch(error => {
                console.error('مشکلی پیش آمد:', error);
                document.getElementById('user-info').innerHTML = `
                    <p style="color: red;">خطایی در دریافت اطلاعات رخ داد. لطفا کنسول مرورگر را بررسی کنید.</p>
                `;
            });
    </script>
</body>
</html>
